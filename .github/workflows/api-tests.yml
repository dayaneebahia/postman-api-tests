name: Run Postman API Tests

on:
  workflow_dispatch:

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório de testes
      - name: Checkout Tests Repository
        uses: actions/checkout@v3

      # 2. Clona sempre a branch develop da API
      - name: Clone API Repository (develop)
        run: |
          git clone --branch develop --single-branch https://${{ secrets.GH_PAT }}@github.com/dayaneebahia/gradia_api.git

      # 3. Sobe os containers (API + DB)
      - name: Build and start API via Docker Compose
        run: |
          docker compose up -d --build
          echo "⏳ Waiting for API to be ready..."
          until curl -s http://localhost:8000/finance/cycles/ > /dev/null; do
            echo "API not ready yet..."
            sleep 5
          done
          echo "✅ API is up!"

      # 4. Instala Node.js
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 5. Instala Newman (CLI do Postman)
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      # 6. Executa os testes Postman
      - name: Run Postman Collection
        run: |
          newman run collections/Finance\ API.postman_collection.json \
          -e collections/DEV.postman_environment.json \
          --reporters cli,htmlextra,junit \
          --reporter-junit-export results.xml \
          --reporter-htmlextra-export results.html
        continue-on-error: true

      # 7. Faz upload dos resultados XML e HTML como artefatos
      - name: Upload Test Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: postman-results
          path: |
            results.xml
            results.html
        if: always()

      # 8. Publica relatório na aba Actions
      - name: Publish JUnit Report
        uses: dorny/test-reporter@v1
        with:
          name: Postman API Tests
          path: results.xml
        if: always()

      # 9. Para e remove os containers no final
      - name: Stop and remove Docker containers
        run: docker compose down
        if: always()
