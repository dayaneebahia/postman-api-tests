name: Run Postman API Tests

on:
  workflow_dispatch: # Executa manualmente

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório de testes
      - name: Checkout Tests Repository
        uses: actions/checkout@v3

      # 2. Clona sempre a branch develop da API
      - name: Clone API Repository (develop)
        run: |
          git clone --branch develop --single-branch https://${{ secrets.GITHUB_TOKEN }}@github.com/dayaneebahia/gradia_api.git

      # 3. Instala Docker Compose
      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      # 4. Sobe os containers (API + DB)
      - name: Build and start API via Docker Compose
        run: |
          docker-compose up -d --build
          echo "⏳ Waiting for API to be ready..."
          until curl -s http://localhost:8000/finance/cycles/ > /dev/null; do
            echo "API not ready yet..."
            sleep 5
          done
          echo "✅ API is up!"

      # 5. Instala Node.js
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 6. Instala Newman (CLI do Postman)
      - name: Install Newman
        run: npm install -g newman

      # 7. Executa os testes Postman
      - name: Run Postman Collection
        run: |
          newman run collections/Finance\ API.postman_collection.json \
          -e collections/DEV.postman_environment.json \
          --reporters cli,junit \
          --reporter-junit-export results.xml
        continue-on-error: true

      # 8. Faz upload dos resultados
      - name: Upload Test Results as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: postman-results
          path: results.xml
        if: always()

      # 9. Publica relatório na aba Actions
      - name: Publish JUnit Report
        uses: dorny/test-reporter@v1
        with:
          name: Postman API Tests
          path: results.xml
          reporter: jest-junit
        if: always()

      # 10. Para e remove os containers
      - name: Stop and remove Docker containers
        run: docker-compose down
        if: always()
