name: Run Postman API Tests

on:
  workflow_dispatch:

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout Tests Repository
        uses: actions/checkout@v3

      - name: Clone API Repository (develop)
        run: |
          git clone --branch develop --single-branch https://${{ secrets.GH_PAT }}@github.com/dayaneebahia/gradia_api.git

      - name: Build and start API via Docker Compose
        run: |
          docker compose up -d --build
          echo "⏳ Waiting for API to be ready..."
          # wait until the endpoint is up (max ~2 min), but don't fail the job if it times out
          for i in {1..24}; do
            if curl -fsS http://localhost:8000/finance/cycles/ > /dev/null; then
              echo " API is up!"
              break
            fi
            echo "API not ready yet..."
            sleep 5
          done

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman Collection
        run: |
          newman run "collections/Finance API.postman_collection.json" \
            -e collections/DEV.postman_environment.json \
            --reporters cli,htmlextra,junit \
            --reporter-junit-export results.xml \
            --reporter-htmlextra-export results.html
        continue-on-error: true

      - name: Upload Test Results as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-results
          path: |
            results.xml
            results.html

      - name: Publish JUnit Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Postman API Tests
          path: results.xml
          reporter: java-junit
          fail-on-failure: false   

      - name: Stop and remove Docker containers
        if: always()
        run: docker compose down
