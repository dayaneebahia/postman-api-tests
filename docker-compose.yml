version: '3.9'

services:
  db:
    image: postgres:14
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: gradiafinance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  gradiafinance:
    build: ./gradia_api              # <-- usa a API clonada
    container_name: django_app
    restart: always
    volumes:
      - ./gradia_api:/app
      - ./gradia_api/gradiafinance/config:/app/config
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./gradia_api/.env
    environment:
      - DEBUG=True
      - DB_NAME=gradiafinance
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_PORT=5432
      - FIREBASE_CREDENTIALS=/app/config/gradia-dev-firebase-adminsdk.json

volumes:
  pgdata:
